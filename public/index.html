<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çiz ve Tahmin Et</title>
    <link rel="stylesheet" href="style.css">
</head>

<div id="word-selection-overlay" class="overlay hidden">
        <div class="modal-box">
            <h2>Bir Kelime Seç</h2>
            <div id="word-options" class="word-options">
                </div>
        </div>
    </div>

<body>

<div class="theme-picker">
        <label>🎨 Tema: </label>
        <select id="theme-select">
            <option value="theme-classic">⚪ Klasik Modern</option>
            <option value="theme-ocean">🌊 Okyanus Esintisi</option>
            <option value="theme-nature">🍃 Orman Fısıltısı</option>
            <option value="theme-sunset">🌅 Günbatımı</option>
            <option value="theme-dark">🌙 Gece Modu</option>
        </select>
    </div>


    <div id="screen-menu" class="screen active">
        <div class="menu-box">
            <h1>Çiz & Tahmin Et</h1>
            <input type="text" id="username-input" placeholder="Kullanıcı Adı" maxlength="15">
            
            <button id="btn-create-room" class="primary-btn">Oda Oluştur</button>
            
            <div class="join-section">
                <input type="text" id="room-code-input" placeholder="Oda Kodu (Örn: A1B2)">
                <button id="btn-join-room">Odaya Katıl</button>
            </div>
            <div id="menu-error" class="error-text"></div>
        </div>
    </div>

    <div id="screen-lobby" class="screen hidden">
        <div class="lobby-box">
            <h2>Lobi - Oda Kodu: <span id="lobby-room-code">---</span></h2>
            
            <div class="lobby-content">
                <div class="player-list-section">
                    <h3>Oyuncular (<span id="player-count">0</span>/8)</h3>
                    <ul id="lobby-players"></ul>
                </div>
                
                <div class="room-settings" id="host-settings" style="display: none;">
                    <h3>Oda Ayarları</h3>
                    <label>Tur Sayısı: <input type="number" id="setting-rounds" value="3" min="1" max="10"></label>
                    <label>Süre (sn): <input type="number" id="setting-time" value="80" min="30" max="120"></label>
                    <button id="btn-start-game" class="primary-btn">Oyunu Başlat</button>
                </div>
            </div>
            
            <button id="btn-leave-lobby" class="danger-btn">Odadan Ayrıl</button>
        </div>
    </div>

    <div id="screen-game" class="screen hidden">
        <div class="game-header">
            <div class="stats">Tur: <span id="game-round">1/3</span> | Süre: <span id="game-time">80</span></div>
            <div class="word-hint" id="word-hint">Kelime Bekleniyor...</div>
        </div>
        
        <div class="game-layout">
            <div class="scoreboard">
                <ul id="game-players"></ul>
            </div>
            
            <div class="canvas-container">
                <canvas id="board"></canvas>
                <div class="tools" id="drawing-tools" style="display: none;">
                    <input type="color" id="color-picker" value="#000000">
                    <input type="range" id="brush-size" min="1" max="20" value="5">
                    <button id="btn-clear">Temizle</button>
                    <button id="btn-eraser">Silgi</button>
                </div>
            </div>
            
            <div class="chat-container">
                <div id="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Tahminini yaz...">
                    <button id="btn-send">Gönder</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
